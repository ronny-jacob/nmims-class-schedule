<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>NMIMS Class Companion</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f6f5f1;--surface:#fbfaf7;--border:#e0dfd9;--border-light:#edede8;--text:#4d453e;--text-muted:#9a9590;--text-light:#b4b3ad;--accent:#594c40;--accent-bg:#eae8e2;--accent-active:#d5d3cd;--radius:16px;--radius-sm:10px;--shadow-sm:0 1px 2px rgba(44,42,38,0.04);--shadow:0 2px 8px rgba(44,42,38,0.06);--shadow-md:0 4px 16px rgba(44,42,38,0.08);--font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
.wrap{max-width:960px;margin:0 auto;padding:20px 14px;display:flex;flex-direction:column;gap:12px}
.id-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow-md)}
.id-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.id-greeting{font-size:13px;font-weight:600;color:var(--text-light);white-space:nowrap;letter-spacing:-.01em}
.id-select{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;outline:none;background:var(--surface);transition:border-color .12s}
@media(hover:hover){.id-select:hover{border-color:var(--text-muted)}}
.id-select:focus{border-color:var(--text-muted)}
.id-info{font-size:12px;color:var(--text-muted);min-width:0;display:flex;flex-direction:column;gap:1px;line-height:1.3}
.id-info .id-r{display:flex;gap:3px}
.id-info .id-l{color:var(--text-light);min-width:42px;flex-shrink:0}
.id-info .id-v{color:var(--text);font-weight:600}
.id-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;min-height:0}
.id-chip{border-radius:6px;padding:3px 10px;font-size:11px;font-weight:600;box-shadow:0 1px 2px rgba(44,42,38,.06),inset 0 1px 0 rgba(255,255,255,.35)}
.pill-group{display:flex;gap:3px;padding:3px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);box-shadow:var(--shadow);overflow-x:auto;-webkit-overflow-scrolling:touch}
.pill{flex-shrink:0;border:none;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:550;cursor:pointer;background:transparent;color:var(--text-muted);-webkit-tap-highlight-color:transparent;transition:all .12s;white-space:nowrap}
@media(hover:hover){.pill:hover{color:var(--text);background:var(--accent-bg)}}
.pill:active{background:var(--accent-active)}.pill.active{background:var(--accent);color:var(--surface);box-shadow:0 1px 3px rgba(44,42,38,.15)}@media(hover:hover){.pill.active:hover{background:var(--accent)}}.pill.active:active{background:var(--accent)}
.pill.sm{padding:5px 12px;font-size:11px}
.panel{display:none}
.panel.active{display:flex;flex-direction:column;gap:12px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;box-shadow:var(--shadow);transition:box-shadow .2s}
.sr{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.si{flex:1;min-width:150px;padding:7px 11px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;outline:none;background:var(--surface);transition:border-color .12s}
@media(hover:hover){.si:hover{border-color:var(--text-muted)}}
.si:focus{border-color:var(--border)}
.sc2{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
.sl{max-height:200px;overflow-y:auto;border:1px solid var(--border-light);border-radius:var(--radius-sm);background:var(--surface);-webkit-overflow-scrolling:touch;box-shadow:inset 0 1px 3px rgba(44,42,38,.04)}
#RC .panel.active{padding-top:6px}
.si2{display:flex;align-items:center;gap:9px;padding:7px 11px;cursor:pointer;border-bottom:1px solid var(--border-light);font-size:13px;-webkit-tap-highlight-color:transparent;transition:background .1s}
.si2:last-child{border-bottom:none}
@media(hover:hover){.si2:hover{background:var(--accent-bg);box-shadow:inset 0 1px 0 rgba(255,255,255,.3)}}
details, summary, .si2, .card, .sl, .id-bar, #studentSelect, .si, input, select, textarea{outline:none}
details:focus, summary:focus, .si2:focus, .card:focus, .sl:focus, .id-bar:focus, #studentSelect:focus, .si:focus, input:focus, select:focus, textarea:focus{outline:none!important;box-shadow:none!important}
details:focus-visible, summary:focus-visible, .si2:focus-visible, .card:focus-visible, .sl:focus-visible, .si:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible{outline:none!important;box-shadow:none!important}
details::-moz-focus-inner, summary::-moz-focus-inner, input::-moz-focus-inner{border:0}
input:-webkit-autofill, input:-webkit-autofill:hover, input:-webkit-autofill:focus{-webkit-box-shadow:0 0 0 30px var(--surface) inset!important;-webkit-text-fill-color:var(--text)!important}

.no-r{padding:20px;text-align:center;color:var(--text-light);font-size:13px}
#stList{margin-top:8px}
.sb{display:flex;align-items:flex-start;gap:7px;margin-top:10px;flex-wrap:wrap;min-height:24px}
#selLbl{font-size:12px;color:var(--text-muted);white-space:nowrap}
.sb2{display:flex;flex-wrap:wrap;gap:10px}
.bdg{padding:3px 10px 3px 12px;border-radius:20px;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:5px;line-height:1.3;background:var(--accent-bg);color:var(--text)}
.rm{cursor:pointer;font-size:14px;line-height:1;opacity:.35;transition:opacity .12s;margin-left:2px}
@media(hover:hover){.rm:hover{opacity:.7}}
.tt-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:var(--radius-sm)}
.tt-grid{display:grid;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;background:var(--surface);box-shadow:var(--shadow);min-width:600px}
.tt-gh{padding:8px 6px;font-size:10px;font-weight:600;color:var(--text-muted);text-align:center;border-bottom:1px solid var(--border);border-right:1px solid var(--border);background:var(--accent-bg);box-shadow:inset 0 1px 0 rgba(255,255,255,.5)}
.tt-gh:last-child{border-right:none}
.tt-gl{display:flex;align-items:center;justify-content:center;padding:4px;font-size:9px;color:var(--text-muted);text-align:center;border-right:1px solid var(--border);border-bottom:1px solid var(--border);line-height:1.2;background:var(--surface);box-shadow:inset 0 1px 0 rgba(255,255,255,.5)}
.tt-gc{border-right:1px solid var(--border);border-bottom:1px solid var(--border);min-height:52px;padding:2px;background:var(--surface);transition:background .15s}
.tt-gc:last-child{border-right:none}
.tt-gh-lunch{padding:0;background:var(--accent-bg);box-shadow:none}
.tt-lunch{background:var(--accent-bg);min-height:0;padding:0;box-shadow:none}
.tt-empty{background:var(--bg);box-shadow:inset 0 1px 2px rgba(44,42,38,.03)}
.tt-cell-flex{display:flex;flex-direction:column;height:100%;gap:2px}
.slot{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:3px;border-radius:5px;padding:4px 6px;font-weight:600;cursor:default;line-height:1.15;overflow:hidden;font-size:9px;min-height:24px;box-shadow:0 1px 3px rgba(44,42,38,.08),inset 0 1px 0 rgba(255,255,255,.4)}
.slot .subj{font-size:10px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.slot .det{font-size:7px;font-weight:500;opacity:.75;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.slot.other{color:var(--text-light);font-size:8px;font-weight:500;background:transparent;flex:0 0 auto;padding:1px 0;box-shadow:none;min-height:0;line-height:1.3}
.tt-count{font-size:10px;color:var(--text-muted)}
.tt-legend{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.tt-legend-item{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600}
.tt-legend-item.other{color:var(--text-light);font-size:9px;padding:2px 6px}
.tt-note{font-size:10px;color:var(--text-muted);line-height:1.3;width:100%;margin-bottom:6px}
.empty{text-align:center;padding:30px 16px;color:var(--text-light);font-size:13px}
.mt{width:100%;border-collapse:collapse;font-size:12px}
.mt th{padding:8px 6px;font-weight:600;font-size:10px;color:var(--text-muted);text-align:left;border-bottom:1px solid var(--border);background:var(--accent-bg)}
.mt td{padding:8px 6px;border-bottom:1px solid var(--border-light);vertical-align:middle}
.mt tr:last-child td{border-bottom:none}
.cn{display:block;font-weight:600;font-size:12.5px}
.fc{display:block;font-size:10px;color:var(--text-muted);margin-top:1px}
.tb{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;display:inline-block;margin:1px;white-space:nowrap}
.cp{display:inline-block;padding:2px 10px;border-radius:20px;font-size:12px;font-weight:700}
.mw{overflow-x:auto}
.mx{border-collapse:collapse;font-size:11px;min-width:400px}
.mx th,.mx td{padding:6px 8px;text-align:center;white-space:nowrap;font-size:11px}
.mx .rh{font-weight:600;font-size:10px;text-align:left}
.mx .dg{color:var(--text-light);font-size:10px}
.mx .bl{background:transparent}
.mx-exp{font-size:11px;color:var(--text-muted);margin-bottom:12px;line-height:1.4}
.mx-note{font-size:10px;color:var(--text-light);margin-top:8px;text-align:center}
.st{width:100%;border-collapse:collapse;font-size:12px}
.st th{padding:8px 6px;font-weight:600;font-size:10px;color:var(--text-muted);text-align:left;border-bottom:1px solid var(--border);background:var(--accent-bg)}
.st td{padding:8px 6px;border-bottom:1px solid var(--border-light);vertical-align:middle}
.st tr:last-child td{border-bottom:none}
.st tr.rr td{padding:0;border-bottom:none}
.tc{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600}
.civ{background:#e0e5ef;color:#2c3e5c}
.cv{background:#e0ede2;color:#2a5038}
.cvi{background:#e6e3ee;color:#3d305a}
.bb{height:4px;background:var(--border-light);border-radius:2px;margin-top:4px;overflow:hidden}
.bf{height:100%;border-radius:2px}
.rt{cursor:pointer;font-size:12px;color:var(--text-muted);transition:transform .2s;display:inline-block}
.rt.open{transform:rotate(180deg)}
.rp{max-height:0;overflow:hidden;transition:max-height .3s;display:flex;flex-wrap:wrap;gap:3px;padding:0 6px}
.rp.open{max-height:600px;padding:8px 6px}
.rn{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.rn.ru{color:#999896;background:#efeee9}
.sd{position:absolute;top:100%;left:0;right:0;max-height:240px;overflow-y:auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);box-shadow:var(--shadow-md);z-index:10;display:none;-webkit-overflow-scrolling:touch}
.sd.open{display:block}
.sd-item{padding:7px 10px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--border-light);-webkit-tap-highlight-color:transparent;display:flex;align-items:center;gap:6px}
.sd-item:last-child{border-bottom:none}
@media(hover:hover){.sd-item:hover{background:var(--accent-bg)}}
.sd-item.active{background:var(--accent-bg)}
.sd-roll{color:var(--text-muted);font-size:11px;margin-left:auto}
</style>
</head>
<body>
<div class="wrap">
  <div class="id-bar">
    <div class="id-row">
      <span class="id-greeting">You:</span>
      <div style="position:relative;flex:1;min-width:160px">
        <input id="studentSelect" class="id-select" type="text" placeholder="Search your name&hellip;" autocomplete="off" oninput="onStudentInput()" onkeydown="onStudentKeydown(event)" onblur="onStudentBlur()" onfocus="onStudentFocus()">
        <div id="studentDropdown" class="sd"></div>
      </div>
      <div id="studentInfo" class="id-info"></div>
    </div>
    <div id="enrolledSubjects" class="id-chips"></div>
  </div>
  <div class="pill-group" id="mainNav">
    <button class="pill active" onclick="showMainTab('tt',this)">Timetable</button>
    <button class="pill" onclick="showMainTab('students',this)">Classmates</button>
    <button class="pill" onclick="showMainTab('subjects',this)">All Subjects</button>
  </div>
  <div id="panel-tt" class="panel active">
    <div class="pill-group">
      <button class="pill sm active" data-range="today" onclick="setTimeRange('today',this)">Today</button>
      <button class="pill sm" data-range="tomorrow" onclick="setTimeRange('tomorrow',this)">Tomorrow</button>
      <button class="pill sm" data-range="week" onclick="setTimeRange('week',this)">This Week</button>
      <button class="pill sm" data-range="next" onclick="setTimeRange('next',this)">Next Week</button>
    </div>
    <div id="ttCount" class="tt-count"></div>
    <div class="tt-scroll"><div class="tt-grid" id="timetable"></div></div>
    <div id="tt-legend" class="tt-legend"></div>
    <div id="ttNoData"></div>
  </div>
  <div id="panel-students" class="panel">
    <div class="card">
      <details id="filterDetails">
        <summary style="font-size:11px;font-weight:600;color:var(--text-muted);cursor:pointer">Select students to highlight in rosters</summary>
        <div style="margin-top:10px">
          <div class="sr">
            <input id="sIn" class="si" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="Search by name&hellip;" oninput="fL()" onkeydown="if(event.key==='Enter'){var e=document.getElementById('stList').querySelector('.si2');if(e)e.click()}">
            <button class="pill sm" onclick="selAll()">All</button>
          </div>
          <div class="sl" id="stList"></div>
        </div>
      </details>
      <div class="sb" id="selBar" style="margin-top:8px">
        <span id="selLbl">0 selected</span>
        <button class="pill sm" onclick="clrAll()" style="margin-left:auto">Clear</button>
        <div id="selBdg"></div>
      </div>
    </div>
    <div class="card" id="RC">
      <div class="pill-group" id="mainTabs">
        <button class="pill sm active" onclick="showTab('iv',this)">Trim IV</button>
        <button class="pill sm" onclick="showTab('v',this)">Trim V</button>
        <button class="pill sm" onclick="showTab('vi',this)">Trim VI</button>
        <button class="pill sm" onclick="showTab('matrix',this)">Matrix</button>
      </div>
      <div id="panel-iv" class="panel active"></div>
      <div id="panel-v" class="panel"></div>
      <div id="panel-vi" class="panel"></div>
      <div id="panel-matrix" class="panel"></div>
    </div>
  </div>
  <div id="panel-subjects" class="panel">
    <div class="card" id="RC2">
      <div class="pill-group">
        <button class="pill sm active" id="srtTrim" onclick="sSrt('trim',this)">By trim</button>
        <button class="pill sm" id="srtCnt" onclick="sSrt('count',this)">By size</button>
        <button class="pill sm" id="srtNm" onclick="sSrt('name',this)">A-Z</button>
      </div>
      <div id="subjResults"></div>
    </div>
  </div>
</div>
<script>
let selectedStudent = null;
const TIME_ORDER = ['8:30-10:00','10:10-11:40','11:50-1:20','1:20-1:50','1:50-3:20','3:30-5:00','6:00-7:30'];
const DAY_NAMES = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const SUBJ_HUES = {};
let ttRange = 'today';

function toTitleCase(s) {
  return s.toLowerCase().replace(/\b\w/g, function(c) { return c.toUpperCase(); });
}

function getTodayDay() { return DAY_NAMES[(new Date().getDay()+6)%7]; }
function getTomorrowDay() { return DAY_NAMES[(new Date().getDay()+7)%7]; }

function initStudentSelect() {
  studentData = DATA.students.slice().sort(function(a,b){return a.name.localeCompare(b.name);});
}

function setTimeRange(range, btn) {
  ttRange = range;
  var btns = document.querySelectorAll('#panel-tt .pill-group .pill');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
  if (btn) btn.classList.add('active');
  renderTimetable();
}

function onStudentInput() {
  var input = document.getElementById('studentSelect');
  var val = input.value.trim().toLowerCase();
  var dd = document.getElementById('studentDropdown');
  if (!val) { dd.classList.remove('open'); return; }
  var matched = [];
  for (var i = 0; i < studentData.length; i++) {
    if (studentData[i].name.toLowerCase().indexOf(val) !== -1) matched.push(studentData[i]);
  }
  if (!matched.length) { dd.classList.remove('open'); return; }
  var html = '';
  for (var i = 0; i < matched.length; i++) {
    html += '<div class="sd-item" data-mi="'+i+'" onmousedown="selectStudentAuto(this)">' + he(matched[i].name) + '<span class="sd-roll">' + he(matched[i].roll) + '</span></div>';
  }
  dd.innerHTML = html;
  dd.classList.add('open');
  dd.querySelector('.sd-item').classList.add('active');
}

function onStudentKeydown(e) {
  var dd = document.getElementById('studentDropdown');
  if (!dd.classList.contains('open')) return;
  var items = dd.querySelectorAll('.sd-item');
  if (!items.length) return;
  var ap = dd.querySelector('.sd-item.active');
  var idx = -1;
  if (ap) { for (var i = 0; i < items.length; i++) { if (items[i] === ap) { idx = i; break; } } }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (ap) ap.classList.remove('active');
    var ni = (idx + 1) % items.length;
    items[ni].classList.add('active');
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (ap) ap.classList.remove('active');
    var ni = (idx - 1 + items.length) % items.length;
    items[ni].classList.add('active');
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (ap) { selectStudentAuto(ap); return; }
    if (items[0]) selectStudentAuto(items[0]);
  } else if (e.key === 'Escape') {
    dd.classList.remove('open');
  }
}

function onStudentBlur() {
  setTimeout(function() { document.getElementById('studentDropdown').classList.remove('open'); }, 200);
}

function onStudentFocus() {
  if (document.getElementById('studentSelect').value.trim()) onStudentInput();
}

var studentData = [];

function selectStudentAuto(el) {
  var mi = parseInt(el.getAttribute('data-mi'));
  var val = document.getElementById('studentSelect').value.trim().toLowerCase();
  var matched = [];
  for (var i = 0; i < studentData.length; i++) {
    if (studentData[i].name.toLowerCase().indexOf(val) !== -1) matched.push(studentData[i]);
  }
  if (mi >= matched.length) return;
  var s = matched[mi];
  if (!s) return;
  selectedStudent = s;
  document.getElementById('studentSelect').value = s.name;
  document.getElementById('studentInfo').innerHTML = '<div class="id-r"><span class="id-l">Roll</span><span class="id-v">'+he(s.roll)+'</span></div><div class="id-r"><span class="id-l">Major</span><span class="id-v">'+he(s.major)+'</span></div>'+(s.minor?'<div class="id-r"><span class="id-l">Minor</span><span class="id-v">'+he(s.minor.replace(/;/g,''))+'</span></div>':'');
  renderTimetable();
  renderEnrolled();
  document.getElementById('studentDropdown').classList.remove('open');
  sel={};so=[];ci=0;tog(s.name);
}

function renderEnrolled() {
  var el = document.getElementById('enrolledSubjects');
  if (!selectedStudent) { el.innerHTML = ''; return; }
  var codes = selectedStudent.subjects;
  el.innerHTML = '';
  for (var i = 0; i < codes.length; i++) {
    var code = codes[i];
    var h = subjectHue(code);
    var nm = DATA.subjects[code] ? DATA.subjects[code].name : '';
    var chip = document.createElement('span');
    chip.className = 'id-chip';
    chip.style.cssText = 'background:hsl('+h+',82%,87%);color:hsl('+h+',62%,18%)';
    chip.innerHTML = he(code) + (nm ? ' <span style="font-weight:400;opacity:.7">' + he(nm) + '</span>' : '');
    el.appendChild(chip);
  }
}

function subjectHue(code) {
  if (SUBJ_HUES[code] !== undefined) return SUBJ_HUES[code];
  var codes = Object.keys(DATA.subjects).sort();
  var idx = codes.indexOf(code);
  SUBJ_HUES[code] = idx < 0 ? 0 : (idx * 360 / codes.length + 10) % 360;
  return SUBJ_HUES[code];
}

function renderTimetable() {
  var gridEl = document.getElementById('timetable');
  var legendEl = document.getElementById('tt-legend');
  var countEl = document.getElementById('ttCount');
  var noDataEl = document.getElementById('ttNoData');
  if (!selectedStudent) {
    gridEl.style.display = 'none';
    legendEl.innerHTML = '';
    countEl.textContent = '';
    noDataEl.innerHTML = '<div class="empty">Select a student</div>';
    return;
  }
  var ttData = (ttRange === 'next' && DATA.timetable_next && DATA.timetable_next.length) ? DATA.timetable_next : null;
  if (ttRange === 'next' && !ttData) {
    gridEl.style.display = 'none';
    legendEl.innerHTML = '';
    countEl.textContent = '';
    noDataEl.innerHTML = '<div class="empty">Not available yet &mdash; will be updated on Saturday</div>';
    return;
  }
  if (ttRange === 'next') ttData = DATA.timetable_next;
  else ttData = DATA.timetable;
  var ttDateRange = (ttRange === 'next' && DATA.date_range_next) ? DATA.date_range_next : DATA.date_range;
  noDataEl.innerHTML = '';
  var subjectSet = {};
  for (var i = 0; i < selectedStudent.subjects.length; i++) subjectSet[selectedStudent.subjects[i]] = true;
  var bsDiv = selectedStudent.bs_div || '';
  var daysToShow;
  if (ttRange === 'today') { daysToShow = [getTodayDay()]; }
  else if (ttRange === 'tomorrow') { daysToShow = [getTomorrowDay()]; }
  else { daysToShow = DAY_NAMES.slice(); }
  var daysWithData = [];
  for (var d = 0; d < daysToShow.length; d++) {
    for (var e = 0; e < ttData.length; e++) {
      if (ttData[e].day === daysToShow[d]) { daysWithData.push(daysToShow[d]); break; }
    }
  }
  if (daysWithData.length === 0) {
    gridEl.style.display = 'none';
    legendEl.innerHTML = '';
    countEl.textContent = 'No sessions';
    noDataEl.innerHTML = '<div class="empty">No classes for this period</div>';
    return;
  }
  gridEl.style.display = 'grid';
  var numDays = daysWithData.length;
  var numTimes = TIME_ORDER.length;
  var colTmpl = '52px';
  for (var t = 0; t < numTimes; t++) {
    colTmpl += TIME_ORDER[t] === '1:20-1:50' ? ' 20px' : ' minmax(72px, 1fr)';
  }
  gridEl.style.gridTemplateColumns = colTmpl;
  var myCount = 0;
  for (var e = 0; e < ttData.length; e++) {
    if (subjectSet[ttData[e].subject] && (ttData[e].subject !== 'BS' || ttData[e].div === bsDiv)) {
      for (var d = 0; d < numDays; d++) {
        if (ttData[e].day === daysWithData[d]) { myCount++; break; }
      }
    }
  }
  countEl.textContent = myCount + ' session' + (myCount !== 1 ? 's' : '') + (ttDateRange ? '  ·  ' + ttDateRange : '');
  var grid = {};
  for (var d = 0; d < numDays; d++) {
    grid[daysWithData[d]] = {};
    for (var t = 0; t < numTimes; t++) {
      grid[daysWithData[d]][TIME_ORDER[t]] = [];
    }
  }
  for (var e = 0; e < ttData.length; e++) {
    var entry = ttData[e];
    if (grid[entry.day] && grid[entry.day][entry.time] !== undefined) {
      grid[entry.day][entry.time].push(entry);
    }
  }
  var html = '';
  html += '<div class="tt-gh tt-time">Day</div>';
  for (var t2 = 0; t2 < numTimes; t2++) {
    var ts = TIME_ORDER[t2];
    var lbl = ts === '1:20-1:50' ? '' : ts.replace('-','\u2013');
    html += '<div class="tt-gh' + (ts === '1:20-1:50' ? ' tt-gh-lunch' : '') + '">' + lbl + '</div>';
  }
  for (var d = 0; d < numDays; d++) {
    var day = daysWithData[d];
    html += '<div class="tt-gl">' + day + '</div>';
    for (var t = 0; t < numTimes; t++) {
      var time = TIME_ORDER[t];
      var isLunch = (time === '1:20-1:50');
      if (isLunch) {
        html += '<div class="tt-gc tt-lunch"></div>';
        continue;
      }
      var entries = grid[day][time];
      if (!entries || entries.length === 0) {
        html += '<div class="tt-gc tt-empty"></div>';
      } else {
        html += '<div class="tt-gc"><div class="tt-cell-flex">';
        for (var pass = 0; pass < 2; pass++) {
          for (var e = 0; e < entries.length; e++) {
            var entry = entries[e];
            var mine = subjectSet[entry.subject] && (entry.subject !== 'BS' || entry.div === bsDiv);
            if ((pass === 0 && !mine) || (pass === 1 && mine)) continue;
            var divLabel = entry.div ? ' ' + entry.div : '';
            if (mine) {
              var h = subjectHue(entry.subject);
              var subjName = DATA.subjects[entry.subject] ? DATA.subjects[entry.subject].name : '';
              html += '<div class="slot" style="background:hsl(' + h + ',78%,85%);color:hsl(' + h + ',62%,18%)" title="' + subjName + (entry.room ? '\\n' + entry.room : '') + (entry.professor ? '\\n' + entry.professor : '') + '">';
              html += '<span class="subj">' + entry.subject + divLabel + '</span>';
              if (entry.room) html += '<span class="det">' + entry.room + '</span>';
              if (entry.professor) html += '<span class="det">' + entry.professor + '</span>';
              html += '</div>';
            } else {
              html += '<div class="slot other">' + entry.subject + '</div>';
            }
          }
        }
        html += '</div></div>';
      }
    }
  }
  gridEl.innerHTML = html;
  var shown = {};
  var lhtml = '';
  for (var e = 0; e < ttData.length; e++) {
    var code = ttData[e].subject;
    if (shown[code]) continue;
    shown[code] = true;
    var mine = subjectSet[code];
    var subj = DATA.subjects[code];
    if (mine) {
      var h = subjectHue(code);
      lhtml += '<span class="tt-legend-item" style="background:hsl(' + h + ',78%,85%);color:hsl(' + h + ',62%,18%)">' + code + (subj ? ' ' + subj.name : '') + '</span>';
    } else {
      lhtml += '<span class="tt-legend-item other">' + code + '</span>';
    }
  }
  var wkLabel = ttRange === 'next' ? 'next week' : 'this week';
  legendEl.innerHTML = '<div class="tt-note">The highlighted classes are your subjects for ' + wkLabel + '.</div>' + lhtml;
}

function enhanceTrimIV() {
  var divMap = {
    "Advanced Financial Statement Analysis": ["AFSA_A", "AFSA_B"],
    "Business Valuation": ["BV_A", "BV_B"],
    "Investment Analysis and Portfolio Management": ["IAPM_A", "IAPM_B"],
    "Management Consulting": ["MC_A", "MC_B"]
  };
  var nameSubj = {};
  for (var i = 0; i < DATA.students.length; i++) {
    var s = DATA.students[i];
    nameSubj[s.name] = {};
    for (var j = 0; j < s.subjects.length; j++) nameSubj[s.name][s.subjects[j]] = true;
  }
  var newClasses = [];
  for (var i = 0; i < CLASSES.iv.length; i++) {
    var entry = CLASSES.iv[i];
    var shortName = sN(entry.cls);
    var codes = divMap[shortName];
    if (codes) {
      for (var d = 0; d < codes.length; d++) {
        var code = codes[d];
        var divLabel = code.slice(-1);
        var divStudents = [];
        for (var j = 0; j < entry.students.length; j++) {
          var nm = entry.students[j];
          if (nameSubj[nm] && nameSubj[nm][code]) divStudents.push(nm);
        }
        newClasses.push({cls: shortName + ' - ' + divLabel, students: divStudents});
      }
    } else {
      newClasses.push(entry);
    }
  }
  CLASSES.iv = newClasses;
}

function hs(n){return Object.prototype.hasOwnProperty.call(sel,n);}

function sN(c){return c.replace(/\s*[-\u2013]\s*(Dr\.?|Prof\.?|New|Visiting|New\/Visiting)[\s\S]*$/i,'').replace(/\s*\([^)]*\)/i,'').trim();}
function fN(c){var m=c.match(/[-\u2013(]\s*((Dr\.?|Prof\.?|New[\/\s]*Visiting Faculty|New Faculty|Visiting Faculty)[\s\S]+)/i);return m?m[1].replace(/\s*\)\s*$/,'').trim():'';}
function dN(name){
  var p=name.trim().split(' '),f=p[0],cl=false;
  for(var k in sel){if(!Object.prototype.hasOwnProperty.call(sel,k))continue;if(k!==name&&k.trim().split(' ')[0]===f){cl=true;break;}}
  if(!cl)return f;
  var li=p.length>1?p[p.length-1][0]+'.':''
  var lb=li?f+' '+li:f;var c2=false;
  for(var k in sel){if(!Object.prototype.hasOwnProperty.call(sel,k))continue;if(k===name)continue;
    var pp=k.trim().split(' ');var pi=pp.length>1?pp[pp.length-1][0]+'.':''
    if(pp[0]===f&&pp[0]+' '+pi===lb){c2=true;break;}}

function rT(tk){

function rMx(){
  var p=document.getElementById('panel-matrix'),n=so.length;
  var exp='<div class="mx-exp"><strong>How to read this:</strong> Each cell shows how many elective classes two students share across all three trims. Darker blue = more classes in common. Use it to spot which pairs have the most overlap &mdash; useful for knowing who you&#39;ll be sitting with the most.</div>';
  if(n<2){p.innerHTML=exp+'<div class="empty">Select at least 2 students to see the overlap matrix.</div>';return;}
  if(n>15){p.innerHTML=exp+'<div class="empty">Select 15 or fewer students to display the matrix.</div>';return;}
  var cnt=[];for(var i=0;i<n;i++){cnt.push([]);for(var j=0;j<n;j++)cnt[i].push(0);}
  var tr=['iv','v','vi'];
  for(var t=0;t<tr.length;t++){var a=CLASSES[tr[t]];
    for(var ci2=0;ci2<a.length;ci2++){var ic=[];
      for(var si=0;si<n;si++){for(var ss2=0;ss2<a[ci2].students.length;ss2++){
        if(a[ci2].students[ss2]===so[si]){ic.push(si);break;}}}
      for(var aa=0;aa<ic.length;aa++){for(var bb=aa+1;bb<ic.length;bb++){
        cnt[ic[aa]][ic[bb]]++;cnt[ic[bb]][ic[aa]]++;}}}
  var mx2=1;for(var i=0;i<n;i++)for(var j=0;j<n;j++){if(i!==j&&cnt[i][j]>mx2)mx2=cnt[i][j];}
  var o=['<div class="mw"><table class="mx"><tr><th></th>'];
  for(var j=0;j<n;j++){

      if(i===j){o.push('<td class="dg">&#8212;</td>');}

    o.push('</tr>');}
  o.push('</table></div>');

  p.innerHTML=exp+o.join('');}}
function rSu(){
